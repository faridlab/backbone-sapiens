name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Verify library builds and tests pass
        run: |
          cargo build --lib
          cargo test  --lib

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Copy the body of the matching `## [<version>]` section. If no such
          # section exists, fall back to `## [Unreleased]` — the convention is
          # to rename that section to the tag's version when cutting a release,
          # but this covers the case where the rename hasn't happened yet.
          awk -v ver="$version" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\["ver"\\]" || $0 ~ /\[Unreleased\]/) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG.md section matched version $version" >&2
            echo "Release $GITHUB_REF_NAME" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
