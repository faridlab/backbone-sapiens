    # ============================================================================
    # Effective Permissions Schema
    # ============================================================================
    EffectivePermissionsResponse:
      type: object
      required:
        - permissions
        - total
        - sources
      properties:
        permissions:
          type: array
          items:
            type: string
          description: List of all effective permission identifiers
          example: ["read:posts", "write:posts", "delete:posts"]
        total:
          type: integer
          description: Total number of effective permissions
          example: 15
        sources:
          type: object
          description: Breakdown of permission sources
          properties:
            role_based:
              type: array
              items:
                type: object
                properties:
                  role:
                    type: string
                    example: "editor"
                  permissions:
                    type: array
                    items:
                      type: string
            direct_grants:
              type: array
              items:
                type: object
                properties:
                  permission:
                    type: string
                  reason:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
                    nullable: true

    # ============================================================================
    # Utility Schemas
    # ============================================================================
    PaginationInfo:
      type: object
      required:
        - total
        - page
        - limit
        - total_pages
      properties:
        total:
          type: integer
          format: int64
          description: Total number of items
          example: 150
        page:
          type: integer
          description: Current page number
          example: 1
        limit:
          type: integer
          description: Items per page
          example: 20
        total_pages:
          type: integer
          description: Total number of pages
          example: 8
        has_next:
          type: boolean
          description: Whether there is a next page
        has_prev:
          type: boolean
          description: Whether there is a previous page

    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: "Operation completed successfully"

    ErrorResponse:
      type: object
      required:
        - error
        - message
        - status
      properties:
        error:
          type: string
          description: Error code
          example: "VALIDATION_ERROR"
        message:
          type: string
          description: Human-readable error message
          example: "Invalid role name format"
        status:
          type: integer
          description: HTTP status code
          example: 400
        details:
          type: object
          description: Additional error details
          additionalProperties: true

  responses:
    BadRequestError:
      description: Bad request - validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "VALIDATION_ERROR"
            message: "Invalid request parameters"
            status: 400
            details:
              field: "name"
              reason: "Name must be alphanumeric"

    UnauthorizedError:
      description: Unauthorized - missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
