          minLength: 2
          maxLength: 50
          pattern: '^[a-zA-Z0-9_]+$'
          example: "editor"
        description:
          type: string
          maxLength: 500
          example: "Content editor with write permissions"
        is_default:
          type: boolean
          default: false

    UpdateRoleRequest:
      type: object
      properties:
