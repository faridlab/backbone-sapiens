# ==============================================================================
# COMPONENTS
# ==============================================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from authentication endpoint

  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (1-indexed)
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1

    LimitParam:
      name: limit
      in: query
      description: Number of items per page
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    SortParam:
      name: sort
      in: query
      description: Sort field and direction (prefix with - for descending)
      required: false
      schema:
        type: string
        example: "-created_at"

    UserIdParam:
      name: userId
      in: path
      description: User unique identifier (UUID)
      required: true
      schema:
        type: string
        format: uuid

    RoleIdParam:
      name: roleId
      in: path
      description: Role unique identifier (UUID)
      required: true
      schema:
        type: string
        format: uuid

    PermissionIdParam:
      name: permissionId
      in: path
      description: Permission unique identifier
      required: true
      schema:
        type: string

    SessionIdParam:
      name: sessionId
      in: path
      description: Session unique identifier (UUID)
      required: true
      schema:
        type: string
        format: uuid

    UserSessionIdParam:
      name: userSessionId
      in: path
      description: User session unique identifier (UUID)
      required: true
      schema:
        type: string
        format: uuid

    SecurityEventIdParam:
      name: eventId
      in: path
      description: Security event unique identifier (UUID)
      required: true
      schema:
        type: string
        format: uuid

    MfaDeviceIdParam:
      name: deviceId
      in: path
      description: MFA device unique identifier (UUID)
      required: true
      schema:
        type: string
        format: uuid

    PasswordResetTokenIdParam:
      name: tokenId
      in: path
      description: Password reset token unique identifier (UUID)
      required: true
      schema:
        type: string
        format: uuid

    AuditLogIdParam:
      name: logId
      in: path
      description: Audit log unique identifier (UUID)
      required: true
      schema:
        type: string
        format: uuid

    PolicyIdParam:
      name: policyId
      in: path
      description: Policy unique identifier (UUID)
      required: true
      schema:
        type: string
        format: uuid

    PolicyAssignmentIdParam:
      name: assignmentId
      in: path
      description: Policy assignment unique identifier (UUID)
      required: true
      schema:
        type: string
        format: uuid

    UserPreferenceIdParam:
      name: preferenceId
      in: path
      description: User preference unique identifier (UUID)
      required: true
      schema:
        type: string
        format: uuid

    UserSettingsIdParam:
      name: settingsId
      in: path
      description: User settings unique identifier (UUID)
      required: true
      schema:
        type: string
        format: uuid

    SystemSettingsIdParam:
      name: settingId
      in: path
      description: System setting unique identifier (UUID)
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    # ============================================================================
    # User Schemas
    # ============================================================================
    User:
      type: object
      required:
        - id
        - username
        - email
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        first_name:
          type: string
          minLength: 1
          maxLength: 100
          description: User's first name (required)
        middle_name:
          type: string
          maxLength: 100
          description: User's middle name (optional)
          nullable: true
        last_name:
          type: string
          maxLength: 100
          description: User's last name (optional)
          nullable: true
        full_name:
          type: string
          readOnly: true
          description: Computed full name (first + middle + last)
        phone:
          type: string
        avatar_url:
          type: string
          format: uri
        status:
          type: string
          enum: [active, inactive, suspended, pending]
        email_verified:
          type: boolean
        phone_verified:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    CreateUserRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          description: User password (min 8 characters)
        first_name:
          type: string
          minLength: 1
          maxLength: 100
          description: User's first name (required)
        middle_name:
          type: string
          maxLength: 100
          description: User's middle name (optional)
          nullable: true
        last_name:
          type: string
          maxLength: 100
          description: User's last name (optional)
          nullable: true
        phone:
          type: string

    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        status:
          type: string
          enum: [active, inactive, suspended]

    UserResponse:
      allOf:
        - $ref: '#/components/schemas/User'

    UserListResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    # ============================================================================
    # Authentication Schemas
    # ============================================================================
    LoginResponse:
      type: object
      required:
        - access_token
        - token_type
        - user
      properties:
        access_token:
          type: string
          description: JWT access token
        refresh_token:
          type: string
          description: JWT refresh token
        token_type:
          type: string
          default: Bearer
        expires_in:
          type: integer
          description: Token expiration time in seconds
        user:
          $ref: '#/components/schemas/UserResponse'

    TokenResponse:
      type: object
      required:
        - access_token
        - token_type
      properties:
        access_token:
          type: string
          description: New JWT access token
        refresh_token:
          type: string
          description: New refresh token (if rotation enabled)
        token_type:
          type: string
          default: Bearer
        expires_in:
          type: integer
          description: Token expiration time in seconds

    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
          description: User password (min 8 characters)
        first_name:
          type: string
          minLength: 1
          maxLength: 100
          description: User's first name (optional during registration)
        middle_name:
          type: string
          maxLength: 100
          description: User's middle name (optional)
          nullable: true
        last_name:
          type: string
          maxLength: 100
          description: User's last name (optional)
          nullable: true

    PartialUpdateUserRequest:
      type: object
      properties:
        update_mask:
          type: array
          items:
            type: string
          description: Fields to update
        username:
          type: string
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        status:
          type: string
          enum: [active, inactive, suspended]

    BulkCreateUsersRequest:
      type: object
      required:
        - entities
      properties:
        entities:
          type: array
          items:
            $ref: '#/components/schemas/CreateUserRequest'
          maxItems: 100

    BulkCreateUsersResponse:
      type: object
      properties:
        entities:
          type: array
          items:
            $ref: '#/components/schemas/User'
        created_count:
          type: integer
        errors:
          type: array
          items:
            type: string

    UpsertUserRequest:
      type: object
      required:
        - email
        - username
      properties:
        id:
          type: string
          format: uuid
          description: If provided, update existing; otherwise create new
        email:
          type: string
          format: email
        username:
          type: string
        password:
          type: string
          minLength: 8
        first_name:
          type: string
        last_name:
          type: string

    UpsertUserResponse:
      type: object
      properties:
        entity:
          $ref: '#/components/schemas/User'
        created:
          type: boolean
          description: true if created, false if updated

    RestoreUserResponse:
      type: object
      properties:
        entity:
          $ref: '#/components/schemas/User'
        success:
          type: boolean
        message:
          type: string

    EmptyTrashResponse:
      type: object
      properties:
        deleted_count:
          type: integer
          format: int64
        success:
          type: boolean
        message:
          type: string

    # ============================================================================
    # Session Schemas
    # ============================================================================
    Session:
      type: object
      required:
        - id
        - user_id
        - token
        - created_at
        - expires_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        token:
          type: string
        ip_address:
          type: string
        user_agent:
          type: string
        device_info:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        last_activity_at:
          type: string
          format: date-time

    CreateSessionRequest:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
          format: uuid
        ip_address:
          type: string
        user_agent:
          type: string
        device_info:
          type: string
        expires_in_seconds:
          type: integer
          default: 86400

    UpdateSessionRequest:
      type: object
      properties:
        is_active:
          type: boolean
        last_activity_at:
          type: string
          format: date-time

    SessionResponse:
      allOf:
        - $ref: '#/components/schemas/Session'

    SessionListResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Session'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    # ============================================================================
    # User Session Schemas
    # ============================================================================
    UserSession:
      type: object
      required:
        - id
        - user_id
        - session_id
        - created_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true

    CreateUserSessionRequest:
      type: object
      required:
        - user_id
        - session_id
      properties:
        user_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        metadata:
          type: object
          additionalProperties: true

    UpdateUserSessionRequest:
      type: object
      properties:
        metadata:
          type: object
          additionalProperties: true

    UserSessionResponse:
      allOf:
        - $ref: '#/components/schemas/UserSession'

    UserSessionListResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserSession'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    # ============================================================================
    # User Security Event Schemas
    # ============================================================================
    UserSecurityEvent:
      type: object
      required:
        - id
        - user_id
        - event_type
        - created_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        event_type:
          type: string
