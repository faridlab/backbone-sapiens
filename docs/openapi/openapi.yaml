          minLength: 3
          maxLength: 100
          description: Permission name in action:resource format
          example: "read:posts"
        description:
          type: string
          maxLength: 500
          description: Permission description
          example: "Permission to read blog posts"
        resource:
          type: string
          maxLength: 50
          description: Resource this permission applies to
          example: "posts"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    CreatePermissionRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
          pattern: '^[a-z_]+:[a-z_]+$'
          example: "read:posts"
        description:
          type: string
          maxLength: 500
          example: "Permission to read blog posts"
        resource:
          type: string
          maxLength: 50
          example: "posts"

    UpdatePermissionRequest:
