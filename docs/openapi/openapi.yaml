openapi: 3.0.3
info:
  title: Sapiens User Management REST API
  description: |
    Comprehensive REST API for Sapiens User Management Service.

    This API provides full CRUD operations for all user management entities including:
    - User Management (CRUD + authentication)
    - Role-Based Access Control (RBAC)
    - Session Management
    - Security Events and Audit Logging
    - MFA Device Management
    - Policy Management
    - User Preferences and Settings
    - System Settings

    ## Authentication
    All endpoints require JWT Bearer token authentication.

    ## Base URL
    - Development: `http://localhost:3003/api/v1`
    - Production: `https://api.startapp.id/sapiens/api/v1`

    ## Rate Limiting
    - 100 requests per minute for GET operations
    - 50 requests per minute for POST/PUT/PATCH operations
    - 30 requests per minute for DELETE operations
  version: 1.0.0
  contact:
    name: Sapiens API Support
    email: support@startapp.id
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3003/api/v1
    description: Development server
  - url: https://api.startapp.id/sapiens/api/v1
    description: Production server

tags:
  - name: Authentication
    description: Authentication operations (login, register, password reset)
  - name: MFA
    description: Multi-factor authentication setup and management
  - name: Users
    description: User management operations
  - name: Sessions
    description: Session management operations
  - name: User Sessions
    description: User-specific session management
  - name: User Security Events
    description: Security event tracking and monitoring
  - name: MFA Devices
    description: Multi-factor authentication device management
  - name: Password Reset Tokens
    description: Password reset token management
  - name: Audit Logs
    description: Audit log operations (read-only)
  - name: Roles
    description: Role management operations
  - name: Permissions
    description: Permission management operations
  - name: Role-Permission Assignments
    description: Assign and manage permissions for roles
  - name: User-Role Assignments
    description: Assign and manage roles for users
  - name: User-Permission Grants
    description: Grant direct permissions to users (Hybrid RBAC)
  - name: Policies
    description: Policy management operations
  - name: Policy Assignments
    description: Policy assignment management
  - name: User Preferences
    description: User preference management
  - name: User Settings
    description: User settings management
  - name: System Settings
    description: System-wide settings management

security:
  - BearerAuth: []

paths:
  # ============================================================================
  # AUTHENTICATION ENDPOINTS (Public)
  # ============================================================================
  /auth/login:
    post:
      tags: [Authentication]
      summary: User login
      description: Authenticate user with email/username and password
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email_or_username, password]
              properties:
                email_or_username:
                  type: string
                  description: Email address or username
                  example: "user@example.com"
                password:
                  type: string
                  format: password
                  description: User password
                  example: "SecurePass123!"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/register:
    post:
      tags: [Authentication]
      summary: User registration
      description: Register a new user account
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /auth/refresh-token:
    post:
      tags: [Authentication]
      summary: Refresh access token
      description: Get a new access token using refresh token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  description: Valid refresh token
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid or expired refresh token

  /auth/forgot-password:
    post:
      tags: [Authentication]
      summary: Request password reset
      description: Send password reset email to user
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  description: User email address
      responses:
        '200':
          description: Password reset email sent (if account exists)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "If an account exists with this email, a reset link has been sent"

  /auth/reset-password:
    post:
      tags: [Authentication]
      summary: Reset password
      description: Reset password using token from email
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:
                  type: string
                  description: Password reset token from email
                new_password:
                  type: string
                  format: password
                  minLength: 8
                  description: New password
                confirm_password:
                  type: string
                  format: password
                  description: Confirm new password
      responses:
        '200':
          description: Password reset successful
        '400':
          description: Invalid or expired token

  /auth/verify-email:
    post:
      tags: [Authentication]
      summary: Verify email address
      description: Verify user email using token
      operationId: verifyEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: Email verification token
      responses:
        '200':
          description: Email verified successfully
        '400':
          description: Invalid or expired token

  /auth/resend-verification:
    post:
      tags: [Authentication]
      summary: Resend verification email
      description: Resend email verification link
      operationId: resendVerification
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Verification email sent

  # ============================================================================
  # PROTECTED AUTH ENDPOINTS
  # ============================================================================
  /auth/protected/logout:
    post:
      tags: [Authentication]
      summary: User logout
      description: Logout current session or all sessions
      operationId: logout
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  description: Specific session to logout (optional)
                all_sessions:
                  type: boolean
                  default: false
                  description: Logout from all sessions
      responses:
        '204':
          description: Logout successful
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/protected/me:
    get:
      tags: [Authentication]
      summary: Get current user
      description: Get currently authenticated user's information
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ============================================================================
  # MFA ENDPOINTS
  # ============================================================================
  /auth/mfa/setup:
    post:
      tags: [MFA]
      summary: Setup MFA
      description: Initialize MFA setup for current user
      operationId: setupMfa
      responses:
        '200':
          description: MFA setup initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  secret:
                    type: string
                    description: TOTP secret (base32 encoded)
                  qr_code_url:
                    type: string
                    description: URL for QR code to scan with authenticator app
                  instructions:
                    type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/mfa/verify:
    post:
      tags: [MFA]
      summary: Verify MFA code
      description: Verify TOTP code to complete MFA setup or authenticate
      operationId: verifyMfa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [verification_code]
              properties:
                verification_code:
                  type: string
                  pattern: '^\d{6}$'
                  description: 6-digit TOTP code
      responses:
        '200':
          description: MFA verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  mfa_enabled:
                    type: boolean
        '400':
          description: Invalid verification code
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/mfa/disable:
    post:
      tags: [MFA]
      summary: Disable MFA
      description: Disable MFA for current user
      operationId: disableMfa
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  format: password
                  description: Current password for verification
                verification_code:
                  type: string
                  description: Current TOTP code
      responses:
        '200':
          description: MFA disabled successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/mfa/devices:
    get:
      tags: [MFA]
      summary: List MFA devices
      description: List all MFA devices for current user
      operationId: listMfaDevices
      responses:
        '200':
          description: List of MFA devices
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices:
                    type: array
                    items:
                      $ref: '#/components/schemas/MfaDeviceResponse'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/mfa/devices/{deviceId}:
    delete:
      tags: [MFA]
      summary: Remove MFA device
      description: Remove an MFA device by ID
      operationId: removeMfaDevice
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Device removed successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /auth/mfa/regenerate-backup:
    post:
      tags: [MFA]
      summary: Regenerate backup codes
      description: Generate new backup codes (invalidates old ones)
      operationId: regenerateBackupCodes
      responses:
        '200':
          description: Backup codes regenerated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  backup_codes:
                    type: array
                    items:
                      type: string
                    description: Array of 10 backup codes
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ============================================================================
  # USERS ENDPOINTS
  # ============================================================================
  /users:
    get:
      tags: [Users]
      summary: List all users
      description: Retrieve a paginated list of all users in the system
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Successfully retrieved users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Users]
      summary: Create a new user
      description: Create a new user with specified details
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /users/{userId}:
    get:
      tags: [Users]
      summary: Get user by ID
      description: Retrieve detailed information about a specific user
      operationId: getUserById
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: Successfully retrieved user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    put:
      tags: [Users]
      summary: Update user
      description: Update an existing user's information
      operationId: updateUser
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    delete:
      tags: [Users]
      summary: Delete user
      description: Delete a user from the system (soft delete)
      operationId: deleteUser
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '204':
          description: User deleted successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /users/search:
    get:
      tags: [Users]
      summary: Search users
      description: Search users by username, email, or name
      operationId: searchUsers
      parameters:
        - name: q
          in: query
          description: Search query string
          required: true
          schema:
            type: string
            minLength: 1
        - name: status
          in: query
          description: Filter by user status
          schema:
            type: string
            enum: [active, inactive, suspended]
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Search results retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/{userId}:
    patch:
      tags: [Users]
      summary: Partial update user (PATCH)
      description: Update specific fields of a user
      operationId: partialUpdateUser
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartialUpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /users/bulk:
    post:
      tags: [Users]
      summary: Bulk create users
      description: Create multiple users in a single request
      operationId: bulkCreateUsers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkCreateUsersRequest'
      responses:
        '201':
          description: Users created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkCreateUsersResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/upsert:
    post:
      tags: [Users]
      summary: Upsert user
      description: Update existing user or create new one
      operationId: upsertUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertUserRequest'
      responses:
        '200':
          description: User upserted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpsertUserResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/trash:
    get:
      tags: [Users]
      summary: List deleted users
      description: Retrieve soft-deleted users from trash
      operationId: listDeletedUsers
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Successfully retrieved deleted users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    delete:
      tags: [Users]
      summary: Empty trash
      description: Permanently delete all soft-deleted users
      operationId: emptyUsersTrash
      parameters:
        - name: before
          in: query
          description: Delete items deleted before this timestamp
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Trash emptied successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyTrashResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/{userId}/restore:
    post:
      tags: [Users]
      summary: Restore deleted user
      description: Restore a soft-deleted user from trash
      operationId: restoreUser
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: User restored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestoreUserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          description: User is not deleted

  # ============================================================================
  # SESSIONS ENDPOINTS
  # ============================================================================
  /sessions:
    get:
      tags: [Sessions]
      summary: List all sessions
      description: Retrieve a paginated list of all active sessions in the system
      operationId: listSessions
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Successfully retrieved sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Sessions]
      summary: Create a new session
      description: Create a new session for a user
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /sessions/{sessionId}:
    get:
      tags: [Sessions]
      summary: Get session by ID
      description: Retrieve detailed information about a specific session
      operationId: getSessionById
      parameters:
        - $ref: '#/components/parameters/SessionIdParam'
      responses:
        '200':
          description: Successfully retrieved session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    put:
      tags: [Sessions]
      summary: Update session
      description: Update an existing session's information
      operationId: updateSession
      parameters:
        - $ref: '#/components/parameters/SessionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSessionRequest'
      responses:
        '200':
          description: Session updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    delete:
      tags: [Sessions]
      summary: Delete session
      description: Invalidate and delete a session
      operationId: deleteSession
      parameters:
        - $ref: '#/components/parameters/SessionIdParam'
      responses:
        '204':
          description: Session deleted successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /sessions/search:
    get:
      tags: [Sessions]
      summary: Search sessions
      description: Search sessions by user ID, IP address, or device info
      operationId: searchSessions
      parameters:
        - name: q
          in: query
          description: Search query string
          required: true
          schema:
            type: string
            minLength: 1
        - name: is_active
          in: query
          description: Filter by active status
          schema:
            type: boolean
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Search results retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ============================================================================
  # USER SESSIONS ENDPOINTS
  # ============================================================================
  /user-sessions:
    get:
      tags: [User Sessions]
      summary: List all user sessions
      description: Retrieve a paginated list of all user session associations
      operationId: listUserSessions
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Successfully retrieved user sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSessionListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [User Sessions]
      summary: Create a new user session
      description: Create a new user session association
      operationId: createUserSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserSessionRequest'
      responses:
        '201':
          description: User session created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /user-sessions/{userSessionId}:
    get:
      tags: [User Sessions]
      summary: Get user session by ID
      description: Retrieve detailed information about a specific user session
      operationId: getUserSessionById
      parameters:
        - $ref: '#/components/parameters/UserSessionIdParam'
      responses:
        '200':
          description: Successfully retrieved user session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSessionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    put:
      tags: [User Sessions]
      summary: Update user session
      description: Update an existing user session
      operationId: updateUserSession
      parameters:
        - $ref: '#/components/parameters/UserSessionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserSessionRequest'
      responses:
        '200':
          description: User session updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    delete:
