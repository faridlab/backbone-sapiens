[package]
name = "backbone-sapiens"
version = "0.1.0"
edition = "2021"
description = "Sapiens Bounded Context: User Management Module for Backbone Framework"

[lib]
path = "src/lib.rs"

[dependencies]
# Backbone Framework CORE dependencies
backbone-core = { git = "https://github.com/faridlab/backbone-framework", branch = "main", features = ["postgres"] }
backbone-orm = { git = "https://github.com/faridlab/backbone-framework", branch = "main" }
backbone-auth = { git = "https://github.com/faridlab/backbone-framework", branch = "main" }
backbone-messaging = { git = "https://github.com/faridlab/backbone-framework", branch = "main" }
backbone-email = { path = "../../../crates/backbone-email" }

# Core dependencies
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
md5 = "0.7"
rust_decimal = { version = "1.36", features = ["serde"] }
sha2 = "0.10"

# Database (PostgreSQL Primary)
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json", "migrate", "rust_decimal"] }

# Protocol Buffers (Generated from Schema-First YAML)
tonic = "0.12"
prost = "0.13"
prost-types = "0.13"
pbjson = "0.7"  # For proto serde support (buf generate)

# Validation (protovalidate is used via buf, not as a Rust crate)
validator = { version = "0.16", features = ["derive"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Validation helpers
regex = "1.0"

# HTTP Framework (using Axum for consistency with backbone)
axum = { version = "0.7", features = ["macros"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Logging
log = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Configuration
config = "0.14"

# Password hashing
argon2 = "0.5"

# JWT token generation and validation
jsonwebtoken = "9.3"

# Random number generation for tokens
rand = "0.8"

# Async utilities (join_all for concurrent queries)
futures = "0.3"

# GraphQL (optional)
async-graphql = { version = "7", optional = true }

[features]
default = []
events = []
auth = []
grpc = []
openapi = []
validation = []
graphql = ["dep:async-graphql"]

[build-dependencies]
tonic-build = "0.12"

[dev-dependencies]
tempfile = "3.0"
tokio-test = "0.4"
mockall = "0.12"
pretty_assertions = "1.0"

# Integration testing framework
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
jsonwebtoken = "9.3"
rand = "0.8"  # For generating random test data

[[bin]]
name = "sapiens-seeder"
path = "src/bin/seeder.rs"
