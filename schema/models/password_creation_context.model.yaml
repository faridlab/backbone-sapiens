# PasswordCreationContext Value Object - Context for password creation
# Source: libs/modules/sapiens/docs/spec-sapiens.md

models:
  - name: PasswordCreationContext
    collection: password_creation_contexts
    soft_delete: true
    description: "Context for password creation operations"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Primary key"

      user_id:
        type: uuid
        attributes: ["@required", "@exclude_from_foreign_key_check"]
        description: "User ID"

      created_via:
        type: PasswordCreationMethod
        attributes: ["@required"]
        description: "How password was created"

      ip_address:
        type: ip?
        description: "IP address of password creation"

      user_agent:
        type: string?
        attributes: ["@max(500)"]
        description: "Browser/user agent"

      reason:
        type: string?
        attributes: ["@max(500)"]
        description: "Reason for password change"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    indexes:
      - type: index
        fields: [user_id]

enums:
  - name: PasswordCreationMethod
    variants:
      - name: registration
        default: true
        description: "Created during registration"
      - name: password_change
        description: "User initiated change"
      - name: reset_by_admin
        description: "Admin reset"
      - name: self_reset
        description: "User self-reset"
      - name: forced_change
        description: "Forced password change"
