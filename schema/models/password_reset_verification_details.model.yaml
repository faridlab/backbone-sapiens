# PasswordResetVerificationDetails Value Object - Token verification information
# Source: libs/modules/sapiens/docs/spec-sapiens.md

models:
  - name: PasswordResetVerificationDetails
    collection: password_reset_verification_details
    soft_delete: true
    description: "Token verification information for password reset"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Primary key"

      verified_at:
        type: datetime?
        description: "When the token was verified"

      verification_ip:
        type: ip?
        description: "IP address that verified the token"

      verification_attempts:
        type: int
        attributes: ["@default(0)", "@non_negative"]
        description: "Number of verification attempts"

      last_attempt_at:
        type: datetime?
        description: "Last verification attempt timestamp"

      verification_method:
        type: string?
        attributes: ["@max(50)"]
        description: "How verification was performed (email, sms, etc.)"

      device_fingerprint:
        type: string?
        attributes: ["@max(255)"]
        description: "Device fingerprint for verification"

      geolocation:
        type: json?
        description: "Geolocation data (lat, lon, country, city)"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    indexes:
      - type: index
        fields: [verified_at]
