# PasswordRequirements Value Object - Password requirements configuration
# Source: libs/modules/sapiens/docs/spec-sapiens.md

models:
  - name: PasswordRequirements
    collection: password_requirements
    soft_delete: true
    description: "Password requirements configuration"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Primary key"

      min_length:
        type: int
        attributes: ["@default(12)", "@min(8)", "@max(128)"]
        description: "Minimum password length"

      max_length:
        type: int
        attributes: ["@default(128)", "@min(64)", "@max(1024)"]
        description: "Maximum password length"

      require_uppercase:
        type: bool
        attributes: ["@default(true)"]
        description: "Require at least one uppercase letter"

      require_lowercase:
        type: bool
        attributes: ["@default(true)"]
        description: "Require at least one lowercase letter"

      require_digits:
        type: bool
        attributes: ["@default(true)"]
        description: "Require at least one digit"

      require_special_characters:
        type: bool
        attributes: ["@default(true)"]
        description: "Require at least one special character"

      require_no_common_passwords:
        type: bool
        attributes: ["@default(true)"]
        description: "Check against common passwords list"

      require_no_user_info:
        type: bool
        attributes: ["@default(true)"]
        description: "Disallow password containing email/username"

      min_entropy_bits:
        type: int
        attributes: ["@default(50)", "@min(30)", "@max(128)"]
        description: "Minimum password entropy in bits"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    indexes: []
