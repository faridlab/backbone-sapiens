# PasswordHistory Entity - Password history tracking for preventing reuse and security analysis
# Source: libs/modules/sapiens/docs/spec-sapiens.md

models:
  - name: PasswordHistory
    collection: password_history
    soft_delete: false
    description: "Password history tracking for preventing reuse and security analysis"
    config:
      generators:
        disabled: [bulk-operations, cqrs, projection]

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Primary key"

      user_id:
        type: uuid
        attributes: ["@required", "@foreign_key(User.id)"]
        description: "User who owns this password"

      password_hash:
        type: string
        attributes: ["@required", "@max(255)"]
        description: "Hashed password value"

      password_strength:
        type: json
        attributes: ["@required"]
        description: "Password strength analysis at creation time"

      password_metadata:
        type: json
        attributes: ["@required"]
        description: "Metadata about the password characteristics"

      creation_context:
        type: json
        attributes: ["@required"]
        description: "Context of when and how password was created"

      status:
        type: PasswordHistoryStatus
        attributes: ["@default(active)"]
        description: "Current status of this password"

      usage:
        type: json
        attributes: ["@required"]
        description: "Usage tracking and analytics"

      expiry:
        type: json?
        description: "Password expiry information"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    relations:
      user:
        type: User
        attributes: ["@one", "@foreign_key(user_id)", "@on_delete(cascade)", "@on_update(cascade)"]

    indexes:
      - type: index
        fields: [user_id, status]
      - type: index
        fields: [user_id, created_at]
      - type: index
        fields: [status]
      - type: index
        fields: [created_at]

enums:
  - name: PasswordHistoryStatus
    variants:
      - name: active
        default: true
        description: "Password is currently active"
      - name: expired
        description: "Password has expired"
      - name: compromised
        description: "Password may be compromised"
      - name: replaced
        description: "Password was replaced"
      - name: rotated
        description: "Password was rotated"
