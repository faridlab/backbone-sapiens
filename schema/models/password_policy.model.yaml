# PasswordPolicy Entity - Enterprise password policy configuration with complex business rules
# Source: libs/modules/sapiens/docs/spec-sapiens.md

models:
  - name: PasswordPolicy
    collection: password_policies
    soft_delete: true
    description: "Enterprise password policy configuration with complex business rules"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Primary key"

      name:
        type: string
        attributes: ["@required", "@max(100)"]
        description: "Policy name for identification"

      organization_id:
        type: uuid?
        attributes: ["@exclude_from_foreign_key_check"]
        description: "Organization-specific policy (null for global)"

      is_active:
        type: bool
        attributes: ["@default(true)"]
        description: "Whether this policy is currently enforced"

      password_requirements:
        type: json
        attributes: ["@required"]
        description: "Complex password requirement configuration"

      password_history:
        type: json
        attributes: ["@required"]
        description: "Password history settings"

      reset_settings:
        type: json
        attributes: ["@required"]
        description: "Password reset settings"

      expiry_settings:
        type: json
        attributes: ["@required"]
        description: "Password expiry settings"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    indexes:
      - type: unique
        fields: [organization_id]
      - type: index
        fields: [is_active]
