# AnonymizationRecord Entity - User data anonymization records
# Source: libs/modules/sapiens/docs/spec-sapiens.md Section 3.2

models:
  - name: AnonymizationRecord
    collection: anonymization_records
    soft_delete: true

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Primary key"

      user_id:
        type: uuid
        attributes: ["@required", "@foreign_key(User.id)"]
        description: "Anonymized user"

      original_email:
        type: string
        attributes: ["@required", "@max(255)"]
        description: "Original email (audit only)"

      original_username:
        type: string
        attributes: ["@required", "@max(100)"]
        description: "Original username (audit only)"

      anonymized_by:
        type: uuid
        attributes: ["@required", "@foreign_key(User.id)"]
        description: "Admin who performed"

      anonymized_at:
        type: datetime
        attributes: ["@required", "@default(now)"]
        description: "Anonymization timestamp"

      reason:
        type: string
        attributes: ["@required", "@max(1000)"]
        description: "Legal basis/justification"

      method:
        type: AnonymizationMethod
        attributes: ["@default(full)"]
        description: "Method used"

      retention_period_days:
        type: integer?
        attributes: ["@min(0)"]
        description: "Days to keep audit data"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

      status:
        type: AnonymizationStatus
        attributes: ["@default(pending)"]
        description: "Anonymization status"

    relations:
      user:
        type: User
        attributes: ["@one", "@foreign_key(user_id)"]

      anonymizer:
        type: User
        attributes: ["@one", "@foreign_key(anonymized_by)"]

    indexes:
      - type: index
        fields: [user_id]
      - type: index
        fields: [anonymized_by, anonymized_at]
      - type: index
        fields: [anonymized_at]

enums:
  - name: AnonymizationMethod
    variants:
      - name: full
        default: true
        description: "Complete anonymization"
      - name: partial
        description: "Partial anonymization (keep some data)"
      - name: pseudonymization
        description: "Replace with pseudonyms"

  - name: AnonymizationStatus
    variants:
      - name: pending
        default: true
        description: "Anonymization requested"
      - name: processing
        description: "Anonymization in progress"
      - name: completed
        description: "Anonymization completed successfully"
      - name: failed
        description: "Anonymization failed"
