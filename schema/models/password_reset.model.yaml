# PasswordReset Entity - Secure password reset workflow with token-based authentication
# Source: libs/modules/sapiens/docs/spec-sapiens.md

models:
  - name: PasswordReset
    collection: password_resets
    soft_delete: true
    description: "Secure password reset workflow with token-based authentication"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Primary key"

      user_id:
        type: uuid
        attributes: ["@required", "@foreign_key(User.id)"]
        description: "User requesting password reset"

      token:
        type: string
        attributes: ["@unique", "@required", "@max(255)", "@sensitive"]
        description: "Cryptographically secure reset token"

      token_hash:
        type: string
        attributes: ["@unique", "@required", "@max(255)"]
        description: "Hashed version of the reset token"

      email:
        type: email
        attributes: ["@required"]
        description: "Email address where reset was sent"

      status:
        type: PasswordResetStatus
        attributes: ["@default(pending)"]
        description: "Current status of the reset request"

      max_attempts:
        type: int
        attributes: ["@default(3)", "@min(1)", "@max(10)"]
        description: "Maximum verification attempts allowed"

      attempts_remaining:
        type: int
        attributes: ["@default(3)", "@min(0)"]
        description: "Remaining verification attempts"

      last_attempt_at:
        type: datetime?
        description: "Last verification attempt timestamp"

      request_metadata:
        type: json
        attributes: ["@required", "@default('{}')"]
        description: "Request tracking and security information"

      verification_details_id:
        type: uuid?
        attributes: ["@foreign_key(PasswordResetVerificationDetails.id)"]
        description: "Token verification information"

      completion_details_id:
        type: uuid?
        attributes: ["@exclude_from_foreign_key_check"]
        description: "Password reset completion information"

      security_id:
        type: uuid?
        attributes: ["@foreign_key(PasswordResetSecurity.id)"]
        description: "Security and rate limiting information"

      device_fingerprint:
        type: string?
        attributes: ["@max(255)"]
        description: "Device fingerprint for security"

      ip_address:
        type: string?
        attributes: ["@max(45)"]
        description: "IP address of requester"

      user_agent:
        type: string?
        attributes: ["@max(500)"]
        description: "Browser/client info"

      verified_at:
        type: datetime?
        description: "When token was verified"

      used_at:
        type: datetime?
        description: "When password was reset"

      expires_at:
        type: datetime
        attributes: ["@required"]
        description: "Token expiration timestamp"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    relations:
      user:
        type: User
        attributes: ["@one", "@foreign_key(user_id)", "@on_delete(cascade)", "@on_update(cascade)"]

      verification_details:
        type: PasswordResetVerificationDetails?
        attributes: ["@one", "@foreign_key(verification_details_id)"]

      security:
        type: PasswordResetSecurity?
        attributes: ["@one", "@foreign_key(security_id)"]

    indexes:
      - type: index
        fields: [user_id]
      - type: unique
        fields: [token]
      - type: unique
        fields: [token_hash]
      - type: index
        fields: [status, expires_at]
      - type: index
        fields: [created_at]

enums:
  - name: PasswordResetStatus
    variants:
      - name: pending
        default: true
        description: "Reset requested, awaiting verification"
      - name: verified
        description: "Token verified, awaiting password change"
      - name: completed
        description: "Password successfully reset"
      - name: expired
        description: "Reset token expired"
      - name: revoked
        description: "Reset was revoked"
