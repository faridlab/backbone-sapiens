# PasswordHistorySettings Value Object - Password history configuration
# Source: libs/modules/sapiens/docs/spec-sapiens.md

models:
  - name: PasswordHistorySettings
    collection: password_history_settings
    soft_delete: true
    description: "Password history configuration"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Primary key"

      track_history:
        type: bool
        attributes: ["@default(true)"]
        description: "Whether to track password history"

      history_count:
        type: int
        attributes: ["@default(5)", "@min(3)", "@max(24)"]
        description: "Number of previous passwords to remember"

      prevent_reuse:
        type: bool
        attributes: ["@default(true)"]
        description: "Prevent reuse of previous passwords"

      prevent_similar:
        type: bool
        attributes: ["@default(true)"]
        description: "Prevent passwords similar to previous ones"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    indexes: []
