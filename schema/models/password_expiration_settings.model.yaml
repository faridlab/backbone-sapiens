# PasswordExpirationSettings Value Object - Password expiration configuration
# Source: libs/modules/sapiens/docs/spec-sapiens.md

models:
  - name: PasswordExpirationSettings
    collection: password_expiration_settings
    soft_delete: true
    description: "Password expiration configuration"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Primary key"

      max_age_days:
        type: int
        attributes: ["@default(90)", "@min(0)", "@max(365)"]
        description: "Maximum password age in days (0 = no expiry)"

      warning_days:
        type: int
        attributes: ["@default(7)", "@min(1)", "@max(30)"]
        description: "Days before expiry to warn user"

      grace_logins:
        type: int
        attributes: ["@default(3)", "@min(0)", "@max(10)"]
        description: "Grace logins allowed after expiry"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    indexes: []
