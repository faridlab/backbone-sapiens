# PasswordResetSecurity Value Object - Security settings for password reset
# Source: libs/modules/sapiens/docs/spec-sapiens.md

models:
  - name: PasswordResetSecurity
    collection: password_reset_security
    soft_delete: true
    description: "Security settings for password reset workflow"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Primary key"

      max_attempts:
        type: int
        attributes: ["@default(3)", "@min(1)", "@max(10)"]
        description: "Maximum verification attempts allowed"

      attempts_remaining:
        type: int
        attributes: ["@default(3)", "@min(0)"]
        description: "Remaining verification attempts"

      last_attempt_at:
        type: datetime?
        description: "Last verification attempt timestamp"

      expires_at:
        type: datetime
        attributes: ["@required"]
        description: "Token expiration timestamp"

      suspicious_activity:
        type: bool
        attributes: ["@default(false)"]
        description: "Flagged as suspicious activity"

      risk_score:
        type: int
        attributes: ["@default(0)", "@min(0)", "@max(100)"]
        description: "Risk score based on request patterns"

      security_flags:
        type: json
        attributes: ["@default('{}')"]
        description: "Additional security flags and metadata"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    indexes:
      - type: index
        fields: [expires_at]
      - type: index
        fields: [suspicious_activity]
