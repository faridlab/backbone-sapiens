# OrganizationUser Entity - Organization membership for users
# Source: libs/modules/sapiens/docs/spec-sapiens.md

models:
  - name: OrganizationUser
    collection: organization_users
    soft_delete: true
    description: "Organization membership for users"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Primary key"

      organization_id:
        type: uuid
        attributes: ["@required", "@exclude_from_foreign_key_check"]
        description: "Organization ID"

      user_id:
        type: uuid
        attributes: ["@required", "@foreign_key(User.id)"]
        description: "User ID"

      role_id:
        type: uuid?
        attributes: ["@foreign_key(Role.id)"]
        description: "Role ID in organization"

      status:
        type: OrganizationMembershipStatus
        attributes: ["@default(active)"]
        description: "Membership status"

      joined_at:
        type: datetime
        attributes: ["@required", "@default(now)"]
        description: "When user joined organization"

      left_at:
        type: datetime?
        description: "When user left organization"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    relations:
      user:
        type: User
        attributes: ["@one", "@foreign_key(user_id)", "@on_delete(cascade)"]

      role:
        type: Role?
        attributes: ["@one", "@foreign_key(role_id)", "@on_delete(set_null)"]

    indexes:
      - type: index
        fields: [organization_id]
      - type: index
        fields: [user_id]
      - type: index
        fields: [organization_id, user_id]
      - type: index
        fields: [status]

enums:
  - name: OrganizationMembershipStatus
    variants:
      - name: active
        default: true
        description: "Active membership"
      - name: inactive
        description: "Inactive membership"
      - name: pending
        description: "Pending membership"
      - name: suspended
        description: "Suspended membership"
