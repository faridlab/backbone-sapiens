# PasswordResetToken Entity - One-time token for password reset flow
# Source: libs/modules/sapiens/docs/domain.md Section 3.10

models:
  - name: PasswordResetToken
    collection: password_reset_tokens
    config:
      generators:
        disabled: [handler, usecase]

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]

      user_id:
        type: uuid
        attributes: ["@required", "@foreign_key(User.id)"]
        description: "User requesting password reset"

      token_hash:
        type: string
        attributes: ["@unique", "@required", "@length(64)"]
        description: "SHA-256 hash of reset token"

      expires_at:
        type: datetime
        attributes: ["@required"]
        description: "1 hour from creation"

      is_used:
        type: bool
        attributes: ["@default(false)"]
        description: "One-time use flag"

      used_at:
        type: datetime?
        description: "When the token was used"

      ip_address:
        type: ip?
        description: "IP that requested reset"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    relations:
      user:
        type: User
        attributes: ["@one", "@foreign_key(user_id)", "@on_delete(cascade)", "@on_update(cascade)"]

    indexes:
      - type: index
        fields: [token_hash]
      - type: index
        fields: [user_id, created_at]
      - type: index
        fields: [expires_at]
