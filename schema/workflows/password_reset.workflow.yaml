# Password Reset Flow
# Multi-step business process for password reset
# Source: BRD FR-003 (Password Management)

name: PasswordReset
description: |
  Secure password reset process including:
  - Token generation and validation
  - Email notification
  - Password update
  - Session invalidation
  - Audit logging

version: 1

trigger:
  event: PasswordResetRequestedEvent
  extract:
    email: "event.email"
    ip_address: "event.ip_address"

config:
  timeout: 1h
  persistence: true

context:
  user: null
  reset_token: null
  reset_url: null

steps:
  - name: find_user
    type: action
    action: query
    entity: User
    params:
      email: "{{ context.email }}"
    on_success:
      set:
        user: "{{ result }}"
      next: check_user_active
    on_failure:
      next: log_unknown_email

  - name: check_user_active
    type: condition
    conditions:
      - if: "context.user != null && context.user.status == 'active'"
        next: invalidate_previous_tokens
      - else: true
        next: log_inactive_user

  - name: invalidate_previous_tokens
    type: action
    action: invalidate_tokens
    params:
      user_id: "{{ context.user.id }}"
      token_type: password_reset
    on_success:
      next: generate_reset_token

  - name: generate_reset_token
    type: action
    action: generate_token
    params:
      type: password_reset
      user_id: "{{ context.user.id }}"
      expires_in: 1h
      ip_address: "{{ context.ip_address }}"
    on_success:
      set:
        reset_token: "{{ result.token }}"
        reset_url: "{{ result.url }}"
      next: send_reset_email

  - name: send_reset_email
    type: action
    action: send_email
    params:
      template: password_reset
      to: "{{ context.email }}"
      subject: "Reset your password"
      data:
        username: "{{ context.user.username }}"
        reset_url: "{{ context.reset_url }}"
        expires_in: "1 hour"
        ip_address: "{{ context.ip_address }}"
    on_success:
      next: log_reset_requested

  - name: log_reset_requested
    type: action
    action: audit_log
    params:
      action: password_reset_requested
      user_id: "{{ context.user.id }}"
      severity: info
      details:
        ip_address: "{{ context.ip_address }}"
    on_success:
      next: wait_for_password_change

  - name: wait_for_password_change
    type: wait
    wait_for:
      event: PasswordResetCompletedEvent
      condition: "event.user_id == context.user.id"
      timeout: 1h
    on_event:
      next: invalidate_all_sessions
    on_timeout:
      next: token_expired

  - name: invalidate_all_sessions
    type: action
    action: revoke_all_sessions
    params:
      user_id: "{{ context.user.id }}"
      reason: password_changed
    on_success:
      next: send_confirmation_email

  - name: send_confirmation_email
    type: action
    action: send_email
    params:
      template: password_changed
      to: "{{ context.email }}"
      subject: "Your password has been changed"
      data:
        username: "{{ context.user.username }}"
        timestamp: "{{ now }}"
        ip_address: "{{ context.ip_address }}"
    on_success:
      next: log_reset_complete
    on_failure:
      next: log_reset_complete  # Continue even if email fails

  - name: log_reset_complete
    type: action
    action: audit_log
    params:
      action: password_reset_completed
      user_id: "{{ context.user.id }}"
      severity: info
      details:
        sessions_revoked: true
    on_success:
      next: complete

  - name: complete
    type: terminal
    status: completed

  # Error branches
  - name: log_unknown_email
    type: action
    action: audit_log
    params:
      action: password_reset_unknown_email
      severity: warning
      details:
        email: "{{ context.email }}"
        ip_address: "{{ context.ip_address }}"
    on_success:
      next: silent_complete

  - name: log_inactive_user
    type: action
    action: audit_log
    params:
      action: password_reset_inactive_user
      user_id: "{{ context.user.id }}"
      severity: warning
      details:
        status: "{{ context.user.status }}"
    on_success:
      next: silent_complete

  # Silent complete - don't reveal if email exists
  - name: silent_complete
    type: terminal
    status: completed
    reason: "If the email exists, a reset link has been sent."

  - name: token_expired
    type: action
    action: audit_log
    params:
      action: password_reset_token_expired
      user_id: "{{ context.user.id }}"
      severity: info
    on_success:
      next: expired

  - name: expired
    type: terminal
    status: expired
    reason: "Reset token expired"

compensation:
  - name: log_compensation
    condition: "steps.invalidate_all_sessions.completed == true"
    action: audit_log
    params:
      action: password_reset_compensation
      severity: warning
