openapi: '3.0.3'
info:
  title: Session API
  version: '1.0.0'
  description: |
    Auto-generated by backbone-cli.
    Session entity CRUD endpoints.

servers:
  - url: http://localhost:3000
    description: Development server

tags:
  - name: Sessions
    description: Session management endpoints

paths:
  /api/v1/sessions:
    get:
      tags:
        - Sessions
      summary: List Sessions
      description: Get a paginated list of Sessions with optional filtering and sorting
      operationId: listSessions
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionList'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Sessions
      summary: Create Session
      description: Create a new Session
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/sessions/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'

    get:
      tags:
        - Sessions
      summary: Get Session by ID
      operationId: getSession
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Sessions
      summary: Update Session (full)
      operationId: updateSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSessionRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Sessions
      summary: Update Session (partial)
      operationId: patchSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchSessionRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Sessions
      summary: Delete Session (soft)
      operationId: deleteSession
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/sessions/bulk:
    post:
      tags:
        - Sessions
      summary: Bulk create Sessions
      operationId: bulkCreateSessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Session'

  /api/v1/sessions/upsert:
    post:
      tags:
        - Sessions
      summary: Upsert Session
      operationId: upsertSession
      parameters:
        - name: key_field
          in: query
          schema:
            type: string
        - name: key_value
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSessionRequest'
      responses:
        '200':
          description: Upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'

  /api/v1/sessions/trash:
    get:
      tags:
        - Sessions
      summary: List deleted Sessions
      operationId: listDeletedSessions
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionList'

  /api/v1/sessions/{id}/restore:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    post:
      tags:
        - Sessions
      summary: Restore deleted Session
      operationId: restoreSession
      responses:
        '200':
          description: Restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/sessions/empty:
    delete:
      tags:
        - Sessions
      summary: Empty trash for Sessions
      operationId: emptyTrashSessions
      responses:
        '200':
          description: Trash emptied
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted_count:
                    type: integer

components:
  schemas:
    Session:
      type: object
      required:
        - id
        - user_id
        - token_hash
        - expires_at
        - device_type
        - is_active
        - metadata
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        token_hash:
          type: string
        expires_at:
          type: string
          format: date-time
        last_activity:
          nullable: true
          type: string
          format: date-time
        ip_address:
          nullable: true
          type: string
        user_agent:
          nullable: true
          type: string
          maxLength: 500
        device_type:
          type: string
        is_active:
          type: boolean
        revoked_at:
          nullable: true
          type: string
          format: date-time
        metadata:
          type: object

    CreateSessionRequest:
      type: object
      required:
        - user_id
        - token_hash
        - expires_at
        - device_type
        - is_active
        - metadata
      properties:
        user_id:
          type: string
          format: uuid
        token_hash:
          type: string
        expires_at:
          type: string
          format: date-time
        last_activity:
          nullable: true
          type: string
          format: date-time
        ip_address:
          nullable: true
          type: string
        user_agent:
          nullable: true
          type: string
          maxLength: 500
        device_type:
          type: string
        is_active:
          type: boolean
        revoked_at:
          nullable: true
          type: string
          format: date-time
        metadata:
          type: object

    UpdateSessionRequest:
      type: object
      required:
        - user_id
        - token_hash
        - expires_at
        - device_type
        - is_active
        - metadata
      properties:
        user_id:
          type: string
          format: uuid
        token_hash:
          type: string
        expires_at:
          type: string
          format: date-time
        last_activity:
          nullable: true
          type: string
          format: date-time
        ip_address:
          nullable: true
          type: string
        user_agent:
          nullable: true
          type: string
          maxLength: 500
        device_type:
          type: string
        is_active:
          type: boolean
        revoked_at:
          nullable: true
          type: string
          format: date-time
        metadata:
          type: object

    PatchSessionRequest:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        token_hash:
          type: string
        expires_at:
          type: string
          format: date-time
        last_activity:
          nullable: true
          type: string
          format: date-time
        ip_address:
          nullable: true
          type: string
        user_agent:
          nullable: true
          type: string
          maxLength: 500
        device_type:
          type: string
        is_active:
          type: boolean
        revoked_at:
          nullable: true
          type: string
          format: date-time
        metadata:
          type: object

    SessionList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Session'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          example: 100
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total_pages:
          type: integer
          example: 5

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Invalid input data
        details:
          type: object
          additionalProperties: true

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    SortByParam:
      name: sort_by
      in: query
      schema:
        type: string

    SortOrderParam:
      name: sort_order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: asc

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
