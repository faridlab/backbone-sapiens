openapi: '3.0.3'
info:
  title: Permission API
  version: '1.0.0'
  description: |
    Auto-generated by backbone-cli.
    Permission entity CRUD endpoints.

servers:
  - url: http://localhost:3000
    description: Development server

tags:
  - name: Permissions
    description: Permission management endpoints

paths:
  /api/v1/permissions:
    get:
      tags:
        - Permissions
      summary: List Permissions
      description: Get a paginated list of Permissions with optional filtering and sorting
      operationId: listPermissions
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionList'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Permissions
      summary: Create Permission
      description: Create a new Permission
      operationId: createPermission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePermissionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/permissions/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'

    get:
      tags:
        - Permissions
      summary: Get Permission by ID
      operationId: getPermission
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Permissions
      summary: Update Permission (full)
      operationId: updatePermission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePermissionRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Permissions
      summary: Update Permission (partial)
      operationId: patchPermission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchPermissionRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Permissions
      summary: Delete Permission (soft)
      operationId: deletePermission
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/permissions/bulk:
    post:
      tags:
        - Permissions
      summary: Bulk create Permissions
      operationId: bulkCreatePermissions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreatePermissionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Permission'

  /api/v1/permissions/upsert:
    post:
      tags:
        - Permissions
      summary: Upsert Permission
      operationId: upsertPermission
      parameters:
        - name: key_field
          in: query
          schema:
            type: string
        - name: key_value
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePermissionRequest'
      responses:
        '200':
          description: Upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'

  /api/v1/permissions/trash:
    get:
      tags:
        - Permissions
      summary: List deleted Permissions
      operationId: listDeletedPermissions
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionList'

  /api/v1/permissions/{id}/restore:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    post:
      tags:
        - Permissions
      summary: Restore deleted Permission
      operationId: restorePermission
      responses:
        '200':
          description: Restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/permissions/empty:
    delete:
      tags:
        - Permissions
      summary: Empty trash for Permissions
      operationId: emptyTrashPermissions
      responses:
        '200':
          description: Trash emptied
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted_count:
                    type: integer

components:
  schemas:
    Permission:
      type: object
      required:
        - id
        - name
        - resource
        - action
        - metadata
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
        description:
          nullable: true
          type: string
          maxLength: 500
        resource:
          type: string
          maxLength: 250
        action:
          type: string
          maxLength: 250
        metadata:
          type: object

    CreatePermissionRequest:
      type: object
      required:
        - name
        - resource
        - action
        - metadata
      properties:
        name:
          type: string
          maxLength: 100
        description:
          nullable: true
          type: string
          maxLength: 500
        resource:
          type: string
          maxLength: 250
        action:
          type: string
          maxLength: 250
        metadata:
          type: object

    UpdatePermissionRequest:
      type: object
      required:
        - name
        - resource
        - action
        - metadata
      properties:
        name:
          type: string
          maxLength: 100
        description:
          nullable: true
          type: string
          maxLength: 500
        resource:
          type: string
          maxLength: 250
        action:
          type: string
          maxLength: 250
        metadata:
          type: object

    PatchPermissionRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        description:
          nullable: true
          type: string
          maxLength: 500
        resource:
          type: string
          maxLength: 250
        action:
          type: string
          maxLength: 250
        metadata:
          type: object

    PermissionList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          example: 100
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total_pages:
          type: integer
          example: 5

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Invalid input data
        details:
          type: object
          additionalProperties: true

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    SortByParam:
      name: sort_by
      in: query
      schema:
        type: string

    SortOrderParam:
      name: sort_order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: asc

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
