openapi: '3.0.3'
info:
  title: Profile API
  version: '1.0.0'
  description: |
    Auto-generated by backbone-cli.
    Profile entity CRUD endpoints.

servers:
  - url: http://localhost:3000
    description: Development server

tags:
  - name: Profiles
    description: Profile management endpoints

paths:
  /api/v1/profiles:
    get:
      tags:
        - Profiles
      summary: List Profiles
      description: Get a paginated list of Profiles with optional filtering and sorting
      operationId: listProfiles
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileList'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Profiles
      summary: Create Profile
      description: Create a new Profile
      operationId: createProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProfileRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/profiles/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'

    get:
      tags:
        - Profiles
      summary: Get Profile by ID
      operationId: getProfile
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Profiles
      summary: Update Profile (full)
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Profiles
      summary: Update Profile (partial)
      operationId: patchProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProfileRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Profiles
      summary: Delete Profile (soft)
      operationId: deleteProfile
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/profiles/bulk:
    post:
      tags:
        - Profiles
      summary: Bulk create Profiles
      operationId: bulkCreateProfiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateProfileRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Profile'

  /api/v1/profiles/upsert:
    post:
      tags:
        - Profiles
      summary: Upsert Profile
      operationId: upsertProfile
      parameters:
        - name: key_field
          in: query
          schema:
            type: string
        - name: key_value
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'

  /api/v1/profiles/trash:
    get:
      tags:
        - Profiles
      summary: List deleted Profiles
      operationId: listDeletedProfiles
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileList'

  /api/v1/profiles/{id}/restore:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    post:
      tags:
        - Profiles
      summary: Restore deleted Profile
      operationId: restoreProfile
      responses:
        '200':
          description: Restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/profiles/empty:
    delete:
      tags:
        - Profiles
      summary: Empty trash for Profiles
      operationId: emptyTrashProfiles
      responses:
        '200':
          description: Trash emptied
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted_count:
                    type: integer

components:
  schemas:
    Profile:
      type: object
      required:
        - user_id
        - first_name
        - metadata
      properties:
        user_id:
          type: string
          format: uuid
        first_name:
          type: string
          maxLength: 100
        middle_name:
          nullable: true
          type: string
          maxLength: 100
        last_name:
          nullable: true
          type: string
          maxLength: 100
        dob:
          nullable: true
          type: string
          format: date
        pob:
          nullable: true
          type: string
        gender:
          nullable: true
          type: string
        phone_number:
          nullable: true
          type: string
        profile_picture_url:
          nullable: true
          type: string
          format: uri
          maxLength: 500
        metadata:
          type: object

    CreateProfileRequest:
      type: object
      required:
        - user_id
        - first_name
        - metadata
      properties:
        user_id:
          type: string
          format: uuid
        first_name:
          type: string
          maxLength: 100
        middle_name:
          nullable: true
          type: string
          maxLength: 100
        last_name:
          nullable: true
          type: string
          maxLength: 100
        dob:
          nullable: true
          type: string
          format: date
        pob:
          nullable: true
          type: string
        gender:
          nullable: true
          type: string
        phone_number:
          nullable: true
          type: string
        profile_picture_url:
          nullable: true
          type: string
          format: uri
          maxLength: 500
        metadata:
          type: object

    UpdateProfileRequest:
      type: object
      required:
        - user_id
        - first_name
        - metadata
      properties:
        user_id:
          type: string
          format: uuid
        first_name:
          type: string
          maxLength: 100
        middle_name:
          nullable: true
          type: string
          maxLength: 100
        last_name:
          nullable: true
          type: string
          maxLength: 100
        dob:
          nullable: true
          type: string
          format: date
        pob:
          nullable: true
          type: string
        gender:
          nullable: true
          type: string
        phone_number:
          nullable: true
          type: string
        profile_picture_url:
          nullable: true
          type: string
          format: uri
          maxLength: 500
        metadata:
          type: object

    PatchProfileRequest:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        first_name:
          type: string
          maxLength: 100
        middle_name:
          nullable: true
          type: string
          maxLength: 100
        last_name:
          nullable: true
          type: string
          maxLength: 100
        dob:
          nullable: true
          type: string
          format: date
        pob:
          nullable: true
          type: string
        gender:
          nullable: true
          type: string
        phone_number:
          nullable: true
          type: string
        profile_picture_url:
          nullable: true
          type: string
          format: uri
          maxLength: 500
        metadata:
          type: object

    ProfileList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Profile'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          example: 100
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total_pages:
          type: integer
          example: 5

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Invalid input data
        details:
          type: object
          additionalProperties: true

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    SortByParam:
      name: sort_by
      in: query
      schema:
        type: string

    SortOrderParam:
      name: sort_order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: asc

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
