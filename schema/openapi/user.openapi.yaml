openapi: '3.0.3'
info:
  title: User API
  version: '1.0.0'
  description: |
    Auto-generated by backbone-cli.
    User entity CRUD endpoints.

servers:
  - url: http://localhost:3000
    description: Development server

tags:
  - name: Users
    description: User management endpoints

paths:
  /api/v1/users:
    get:
      tags:
        - Users
      summary: List Users
      description: Get a paginated list of Users with optional filtering and sorting
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Users
      summary: Create User
      description: Create a new User
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'

    get:
      tags:
        - Users
      summary: Get User by ID
      operationId: getUser
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Users
      summary: Update User (full)
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Users
      summary: Update User (partial)
      operationId: patchUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchUserRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Users
      summary: Delete User (soft)
      operationId: deleteUser
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/users/bulk:
    post:
      tags:
        - Users
      summary: Bulk create Users
      operationId: bulkCreateUsers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /api/v1/users/upsert:
    post:
      tags:
        - Users
      summary: Upsert User
      operationId: upsertUser
      parameters:
        - name: key_field
          in: query
          schema:
            type: string
        - name: key_value
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /api/v1/users/trash:
    get:
      tags:
        - Users
      summary: List deleted Users
      operationId: listDeletedUsers
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'

  /api/v1/users/{id}/restore:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    post:
      tags:
        - Users
      summary: Restore deleted User
      operationId: restoreUser
      responses:
        '200':
          description: Restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/users/empty:
    delete:
      tags:
        - Users
      summary: Empty trash for Users
      operationId: emptyTrashUsers
      responses:
        '200':
          description: Trash emptied
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted_count:
                    type: integer

components:
  schemas:
    User:
      type: object
      required:
        - id
        - username
        - email
        - password_hash
        - status
        - email_verified
        - failed_login_attempts
        - metadata
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password_hash:
          type: string
          minLength: 60
        status:
          type: string
        email_verified:
          type: boolean
        failed_login_attempts:
          type: integer
          format: int32
        locked_until:
          nullable: true
          type: string
          format: date-time
        last_login:
          nullable: true
          type: string
          format: date-time
        metadata:
          type: object

    CreateUserRequest:
      type: object
      required:
        - username
        - email
        - password_hash
        - status
        - email_verified
        - failed_login_attempts
        - metadata
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password_hash:
          type: string
          minLength: 60
        status:
          type: string
        email_verified:
          type: boolean
        failed_login_attempts:
          type: integer
          format: int32
        locked_until:
          nullable: true
          type: string
          format: date-time
        last_login:
          nullable: true
          type: string
          format: date-time
        metadata:
          type: object

    UpdateUserRequest:
      type: object
      required:
        - username
        - email
        - password_hash
        - status
        - email_verified
        - failed_login_attempts
        - metadata
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password_hash:
          type: string
          minLength: 60
        status:
          type: string
        email_verified:
          type: boolean
        failed_login_attempts:
          type: integer
          format: int32
        locked_until:
          nullable: true
          type: string
          format: date-time
        last_login:
          nullable: true
          type: string
          format: date-time
        metadata:
          type: object

    PatchUserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password_hash:
          type: string
          minLength: 60
        status:
          type: string
        email_verified:
          type: boolean
        failed_login_attempts:
          type: integer
          format: int32
        locked_until:
          nullable: true
          type: string
          format: date-time
        last_login:
          nullable: true
          type: string
          format: date-time
        metadata:
          type: object

    UserList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          example: 100
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total_pages:
          type: integer
          example: 5

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Invalid input data
        details:
          type: object
          additionalProperties: true

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    SortByParam:
      name: sort_by
      in: query
      schema:
        type: string

    SortOrderParam:
      name: sort_order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: asc

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
