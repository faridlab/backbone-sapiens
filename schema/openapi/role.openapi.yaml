openapi: '3.0.3'
info:
  title: Role API
  version: '1.0.0'
  description: |
    Auto-generated by backbone-cli.
    Role entity CRUD endpoints.

servers:
  - url: http://localhost:3000
    description: Development server

tags:
  - name: Roles
    description: Role management endpoints

paths:
  /api/v1/roles:
    get:
      tags:
        - Roles
      summary: List Roles
      description: Get a paginated list of Roles with optional filtering and sorting
      operationId: listRoles
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleList'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Roles
      summary: Create Role
      description: Create a new Role
      operationId: createRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/roles/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'

    get:
      tags:
        - Roles
      summary: Get Role by ID
      operationId: getRole
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Roles
      summary: Update Role (full)
      operationId: updateRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Roles
      summary: Update Role (partial)
      operationId: patchRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchRoleRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Roles
      summary: Delete Role (soft)
      operationId: deleteRole
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/roles/bulk:
    post:
      tags:
        - Roles
      summary: Bulk create Roles
      operationId: bulkCreateRoles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'

  /api/v1/roles/upsert:
    post:
      tags:
        - Roles
      summary: Upsert Role
      operationId: upsertRole
      parameters:
        - name: key_field
          in: query
          schema:
            type: string
        - name: key_value
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'

  /api/v1/roles/trash:
    get:
      tags:
        - Roles
      summary: List deleted Roles
      operationId: listDeletedRoles
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleList'

  /api/v1/roles/{id}/restore:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    post:
      tags:
        - Roles
      summary: Restore deleted Role
      operationId: restoreRole
      responses:
        '200':
          description: Restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/roles/empty:
    delete:
      tags:
        - Roles
      summary: Empty trash for Roles
      operationId: emptyTrashRoles
      responses:
        '200':
          description: Trash emptied
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted_count:
                    type: integer

components:
  schemas:
    Role:
      type: object
      required:
        - id
        - name
        - is_default
        - metadata
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 50
        description:
          nullable: true
          type: string
          maxLength: 1000
        is_default:
          type: boolean
        metadata:
          type: object

    CreateRoleRequest:
      type: object
      required:
        - name
        - is_default
        - metadata
      properties:
        name:
          type: string
          maxLength: 50
        description:
          nullable: true
          type: string
          maxLength: 1000
        is_default:
          type: boolean
        metadata:
          type: object

    UpdateRoleRequest:
      type: object
      required:
        - name
        - is_default
        - metadata
      properties:
        name:
          type: string
          maxLength: 50
        description:
          nullable: true
          type: string
          maxLength: 1000
        is_default:
          type: boolean
        metadata:
          type: object

    PatchRoleRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 50
        description:
          nullable: true
          type: string
          maxLength: 1000
        is_default:
          type: boolean
        metadata:
          type: object

    RoleList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          example: 100
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total_pages:
          type: integer
          example: 5

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Invalid input data
        details:
          type: object
          additionalProperties: true

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    SortByParam:
      name: sort_by
      in: query
      schema:
        type: string

    SortOrderParam:
      name: sort_order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: asc

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
