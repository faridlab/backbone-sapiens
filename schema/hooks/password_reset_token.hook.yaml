# PasswordResetToken Workflow - Password reset flow management
# Source: libs/modules/sapiens/docs/domain.md Section 3.10

name: PasswordResetToken
model: password_reset_token.model.yaml

# =============================================================================
# PRIORITY 1: State Machine - Token Lifecycle
# =============================================================================
states:
  field: is_used

  values:
    valid:
      initial: true
      on_enter:
        - "log(password_reset.token_created, { user_id: user_id, ip_address: ip_address })"

    used:
      final: true
      on_enter:
        - "set: used_at = now()"
        - "log(password_reset.token_used, { user_id: user_id })"

  transitions:
    use:
      from: valid
      to: used
      roles: [system]
      condition: "expires_at > now()"
      message: "Token has expired"

# =============================================================================
# PRIORITY 2: Validation Rules
# =============================================================================
rules:
  unique_token_hash:
    when: [create]
    condition: "count(PasswordResetToken, token_hash == $this.token_hash) == 0"
    message: "Token hash collision detected"
    code: TOKEN_HASH_COLLISION

  expires_in_future:
    when: [create]
    condition: "expires_at > now()"
    message: "Token expiry must be in the future"
    code: INVALID_EXPIRY

  max_active_tokens:
    when: [create]
    condition: "count(PasswordResetToken, user_id == $this.user_id && is_used == false && expires_at > now()) < 3"
    message: "Too many pending password reset requests. Please wait before requesting another."
    code: TOO_MANY_RESET_REQUESTS

  rate_limit:
    when: [create]
    # Note: created_at is now in metadata.created_at
    condition: "count(PasswordResetToken, user_id == $this.user_id && metadata.created_at > now() - 5.minutes) == 0"
    message: "Please wait 5 minutes before requesting another password reset"
    code: RATE_LIMITED

  no_modify_used:
    when: [update]
    condition: "$old.is_used == false"
    message: "Cannot modify used reset tokens"
    code: TOKEN_ALREADY_USED

# =============================================================================
# PRIORITY 3: Access Control
# =============================================================================
permissions:
  super_admin:
    allow:
      - action: read
      - action: list
    deny:
      - action: create      # Even super_admin cannot forge tokens
      - action: update
      - action: delete

  admin:
    allow:
      - action: read
      - action: list
    deny:
      - action: create
      - action: update
      - action: delete

  user:
    deny:
      - action: all         # Users cannot access reset tokens directly

  guest:
    deny:
      - action: all         # Guests can trigger reset (via public API), but not access tokens

  system:
    allow:
      - action: create
      - action: read
      - action: use
    deny:
      - action: update
      - action: delete

# =============================================================================
# PRIORITY 4: Triggers
# =============================================================================
triggers:
  after_create:
    actions:
      - "send_email(password_reset, user.email, { reset_link: $context.reset_url, expires_in: '1 hour' })"
      - "emit: PasswordResetRequestedEvent(user_id: user_id, ip_address: ip_address)"

  after_update_is_used:
    actions:
      - "trigger: invalidate_other_reset_tokens"
      - "emit: PasswordResetCompletedEvent(user_id: user_id)"
    if: "is_used == true"

  scheduled_cleanup:
    schedule: "every 1.hour"
    actions:
      - "trigger: cleanup_expired_tokens(hours: 24)"

# =============================================================================
# PRIORITY 5: Computed Fields
# =============================================================================
computed:
  is_expired: "expires_at <= now()"
  is_valid: "is_used == false && expires_at > now()"
  time_until_expiry: "expires_at > now() ? expires_at - now() : null"
  # Note: created_at is now in metadata.created_at
  age: "now() - metadata.created_at"
  status_display: |
    is_used ? 'Used' :
    is_expired ? 'Expired' : 'Valid'
